services:

  # InterSystems IRIS 
  iris-azure-servicebus-interop:
    build:
      context: iris
      dockerfile: Dockerfile
    container_name: iris-azure-servicebus-interop
    ports:
      - 51776:1972
      - 52776:52773
    volumes:
      - ./:/app
      - ./iris/durabledata:/durabledata
    environment:
    - ISC_DATA_DIRECTORY=/durabledata
